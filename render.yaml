services:
  - type: web
    name: ngumpulyuk-backend
    runtime: python
    region: singapore
    plan: free

    buildCommand: >
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py collectstatic --noinput

    startCommand: gunicorn ngumpulyuk_project.wsgi:application --workers 2 --timeout 120 --graceful-timeout 30

    healthCheckPath: /health/

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        sync: false

      - key: GOOGLE_CLIENT_ID
        sync: false

      - key: GOOGLE_CLIENT_SECRET
        sync: false

      - key: SOCIAL_AUTH_PASSWORD
        sync: false

      - key: EMAIL_HOST_USER
        sync: false

      - key: EMAIL_HOST_PASSWORD
        sync: false

      - key: DEFAULT_FROM_EMAIL
        sync: false

      - key: FRONTEND_URL
        sync: false

      # ───  production ────────────────────────────
      - key: DJANGO_ENV
        value: production

      - key: DEBUG
        value: 'False'

      - key: ALLOWED_HOSTS
        value: '.onrender.com'

      - key: PYTHON_VERSION
        value: '3.11.0'
