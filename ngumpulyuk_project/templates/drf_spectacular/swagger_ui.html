<!DOCTYPE html>
<html>
  <head>
    {% block head %}
    <title>{{ title|default:"Swagger" }}</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% if favicon_href %}<link rel="icon" href="{{ favicon_href }}">{% endif %}
    <link rel="stylesheet" href="{{ swagger_ui_css }}">
    <style>
      html { box-sizing: border-box; overflow-y: scroll; }
      *, *:after, *:before { box-sizing: inherit; }
      body { background: #fafafa; margin: 0; }
    </style>
    {% endblock head %}
  </head>
  <body>
    {% block body %}
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle }}"></script>
    <script src="{{ swagger_ui_standalone }}"></script>
    {% if script_url %}
    <script src="{{ script_url }}"></script>
    {% else %}
    <script>
    {% include template_name_js %}
    </script>
    {% endif %}
    {# Swagger UI menyebut bagian bawah "Schemas"; tampilkan sebagai "Models". #}
    <script>
    (function() {
      function relabel() {
        document.querySelectorAll("#swagger-ui h4").forEach(function(el) {
          var t = (el.textContent || "").trim();
          if (t === "Schemas") el.textContent = "Models";
        });
      }
      var root = document.getElementById("swagger-ui");
      if (root) {
        new MutationObserver(relabel).observe(root, { childList: true, subtree: true });
        relabel();
        setTimeout(relabel, 500);
        setTimeout(relabel, 2000);
      }
    })();
    </script>
    {% endblock %}
  </body>
</html>
